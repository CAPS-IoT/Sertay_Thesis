---
# Lightweight OCI registry (zot) for the SIF-Wasm continuum.
# Hosts OCI artifacts for the edge host, operator, and Wasm reload workflow.
# The ESP32 reload path consumes a direct blob URL supplied by the control plane.
apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: sertay
data:
  config.json: |
    {
      "distSpecVersion": "1.1.1",
      "storage": { "rootDirectory": "/var/lib/registry" },
      "http": { "address": "0.0.0.0", "port": "5000" },
      "log": { "level": "warn" }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: sertay
  labels: { app: zot }
spec:
  replicas: 1
  selector:
    matchLabels: { app: zot }
  template:
    metadata:
      labels: { app: zot }
    spec:
      containers:
      - name: zot
        image: ghcr.io/project-zot/zot-linux-amd64:v2.1.2
        ports:
        - containerPort: 5000
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/zot
        - name: data
          mountPath: /var/lib/registry
        readinessProbe:
          httpGet: { path: /v2/, port: 5000 }
          initialDelaySeconds: 5
          periodSeconds: 300
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits:   { memory: "256Mi", cpu: "500m" }
      volumes:
      - name: config
        configMap: { name: zot-config }
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: sertay
  labels: { app: zot }
spec:
  type: NodePort
  selector: { app: zot }
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    nodePort: 30500
